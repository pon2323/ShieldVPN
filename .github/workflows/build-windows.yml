name: Build Windows Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Download sing-box core
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/SagerNet/sing-box/releases/download/v1.13.13/sing-box-1.13.13-windows-amd64.zip" -OutFile "sing-box.zip"
          Expand-Archive "sing-box.zip" -DestinationPath "." -Force
          New-Item -ItemType Directory -Force -Path "client/engines"
          Copy-Item "sing-box-1.13.13-windows-amd64/sing-box.exe" "client/engines/sing-box.exe" -Force
      - name: Build client
        shell: cmd
        run: |
          cd client
          npm ci || npm install
          npm run build
      - name: Build launcher
        shell: cmd
        run: |
          cd launcher
          npm ci || npm install
          npm run build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ShieldVPN-Windows-Installers
          path: |
            client/dist/ShieldVPNClientSetup.exe
            launcher/dist/ShieldVPNLauncherSetup.exe
      - name: Attach installers to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            client/dist/ShieldVPNClientSetup.exe
            launcher/dist/ShieldVPNLauncherSetup.exe
